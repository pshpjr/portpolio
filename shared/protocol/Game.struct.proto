syntax = "proto3";

package C2G;

// 공통 구조체 import
import "xxx.Common.proto";

message UserInfo 
{
	InstanceKey user_key 	= 1;
	int32		char_type 	= 2;
	string		nickname 	= 3;
}

message StatInfo
{

}

message CurrencyInfo
{
	InstanceKey char_key 		= 1;
	int32		type    		= 2;
	int32		count   		= 3;
}

message UserInfo 
{
	InstanceKey uid 		= 1;
	int32		tid    		= 2;
	int32		lv     		= 3;
	int32		exp    		= 4;
	int32		hp     		= 5;
	int32		mp     		= 6;
}

message TransformInfo
{
	InstanceKey fieldId = 1;
	int32 x = 2;
	int32 y = 3;
	int32 z = 4;
}

message IntPointInfo 
{
    int32 x = 1;
    int32 y = 2;
}

enum EnumStorageType
{
	None 		= 0;
	Inventory 	= 1;
	Character 	= 2;
	Account 	= 3;
}

message ItemInfo
{
	InstanceKey			item_id			    = 1;
	int32				item_tid			= 2;
	int32				count				= 3;
}

