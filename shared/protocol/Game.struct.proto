syntax = "proto3";

package C2G;

// 공통 구조체 import
import "xxx.Common.proto";

message UserInfo 
{
	InstanceKey user_key 	= 1;
	int32		char_type 	= 2;
	string		nickname 	= 3;
}

// 공통 타입들
message CharacterInfo 
{
	InstanceKey char_key 	= 1;
	int32		tid    		= 2;
	int32		lv     		= 3;
	int32		exp    		= 4;
	int32		hp     		= 5;
	int32		mp     		= 6;
}

message CurrencyInfo
{
	InstanceKey char_key 		= 1;
	int32		type    		= 2;
	int32		count   		= 3;
}

// 좌표 정보를 담는 메시지
message IntPointInfo 
{
    int32 x = 1;
    int32 y = 2;
}

// ItemLocationInfo를 써야해서 아래로 내림
message ItemInfo
{
	InstanceKey			item_id			    = 1;
	int32				item_tid			= 2;
	int32				count				= 3;
}